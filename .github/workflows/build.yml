name: Build FFmpeg for iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Clone Build Script
        uses: actions/checkout@v4
        with:
          repository: 'kewlbear/FFmpeg-iOS-build-script'
          path: 'FFmpeg-iOS-build-script'

      - name: Install Build Tools
        run: |
          brew update
          brew install nasm yasm automake libtool pkg-config

      - name: Fix HTTP to HTTPS in script
        run: |
          cd FFmpeg-iOS-build-script
          # Заменяем http://www.ffmpeg.org на https://ffmpeg.org внутри скрипта
          sed -i '' 's/http:\/\/www.ffmpeg.org/https:\/\/www.ffmpeg.org/g' build-ffmpeg.sh

      - name: Run Build Script
        run: |
          cd FFmpeg-iOS-build-script
          # Прописываем версию 6.0 напрямую в настройки скрипта
          sed -i '' 's/FFMPEG_VERSION="4.3.1"/FFMPEG_VERSION="6.0"/g' build-ffmpeg.sh
          ./build-ffmpeg.sh

      - name: Pack and Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FFmpeg-iOS-Frameworks
          path: FFmpeg-iOS-build-script/FFmpeg-iOS/
